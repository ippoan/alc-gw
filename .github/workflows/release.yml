name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      # win25 イメージに makensis は無い (wails は警告だけ出して素通りする)
      - name: Install NSIS
        run: choco install nsis -y

      - name: Build with installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS\Bin;C:\Program Files (x86)\NSIS"
          wails build -nsis -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Verify installer exists
        run: |
          if (!(Test-Path "build/bin/alc-gw-amd64-installer.exe")) {
            Get-ChildItem build/bin
            exit 1
          }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/alc-gw-amd64-installer.exe
          generate_release_notes: true
